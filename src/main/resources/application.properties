# AgentScope DashScope Demo 配置文件
# 
# 注意：不要在配置文件中硬编码 API Key！
# 请使用环境变量 DASHSCOPE_API_KEY 或 JVM 参数 -Ddashscope.api.key

# SLF4J Simple 日志级别（trace / debug / info / warn / error）
org.slf4j.simpleLogger.defaultLogLevel=info

# 日志文件输出（默认仅输出到控制台，可取消注释写入文件）
# org.slf4j.simpleLogger.logFile=agent-demo.log

# 日期时间格式
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS

# 是否在日志中显示线程名
org.slf4j.simpleLogger.showThreadName=true

# 是否显示简短的日志名称（仅类名，不含包名）
org.slf4j.simpleLogger.showShortLogName=false
